{% extends 'base.html' %}
{% block content %}
<h2>Craigslist Realestate Quick Query</h2>
<div class="subtitle">Demo: query /v1/collections/_craigslist_realestate/search</div>
<div class="tool-row">
  <button id="runQuery">Run Query</button>
  <button id="clearQuery" class="secondary">Clear</button>
</div>
<div id="status" class="status">Idle</div>
<div id="result" class="result">No results yet.</div>
<script>
  window.quickQueryConfig = { collection: '_craigslist_realestate', filter: { price: { $gte: 5000 } } };
</script>
{% endblock %}
